name: pr-fast

on:
  pull_request:
    branches: ["**"]

jobs:
  fast_required:
    runs-on: ubuntu-latest
    timeout-minutes: 12
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Run fast required suite
        run: python -m pytest -q -m "tier_fast and not quarantined" --maxfail=1 --no-cov
      - name: Upload diagnostics artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: pr-fast-artifacts
          path: |
            .artifacts/e2e/**
            **/*.log
            **/*summary*.json
            **/*api*.json
            **/*.png

