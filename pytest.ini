[pytest]
pythonpath = .
testpaths = tests
addopts =
    --strict-markers
    --cov=testo_core
    --cov-branch
    --cov-report=term-missing:skip-covered
    --cov-fail-under=50

markers =
    unit: Unit-level tests (pure logic, heavy mocking)
    integration: Flow/integration tests (component interaction, state persistence)
    e2e: End-to-end sequential journeys
    contract: Contract/schema validation tests
    tier_fast: PR-required deterministic baseline suite
    tier_heavy: PR-optional deep integration suite (local/mocked providers)
    tier_external: Nightly/release real provider lifecycle suite
    provider_github: Scenario exercises GitHub provider behavior
    provider_gitlab: Scenario exercises GitLab provider behavior
    plugin_path: Scenario validates plugin loading/execution path
    cleanup_required: Scenario provisions ephemeral resources requiring cleanup verification
    quarantined: Temporarily excluded flaky scenario (tracked and reviewed)
    flaky_demo: Opt-in flaky demo failure injection (requires UQO_FLAKY_DEMO=1)
    attach_http_on_fail: Force request/response attachment even for unit tests

